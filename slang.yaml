# Slang: ARB → type-safe Dart (same idea as Flutter gen-l10n, works without Flutter SDK).
# Run: dart run slang
# Docs: https://pub.dev/packages/slang
base_locale: en
fallback_strategy: base_locale
input_directory: lib/l10n/arb
input_file_pattern: .arb
output_directory: lib/l10n/generated
flutter_integration: false
lazy: false
translate_var: strings
class_name: AppLocalizations
enum_name: AppLocale
string_interpolation: braces
format:
  enabled: true
  width: 100
