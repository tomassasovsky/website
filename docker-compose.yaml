services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4323:8080"
    environment:
      - CONTACT_EMAIL=${CONTACT_EMAIL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      - GOOGLE_USER_EMAIL=${GOOGLE_USER_EMAIL}
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID:-primary}
      - BOOKING_TIMEZONE=${BOOKING_TIMEZONE:-America/Argentina/Buenos_Aires}
      - BOOKING_UTC_OFFSET_HOURS=${BOOKING_UTC_OFFSET_HOURS:--3}
      - BOOKING_DURATION_MINUTES=${BOOKING_DURATION_MINUTES:-30}
      - BOOKING_START_HOUR=${BOOKING_START_HOUR:-9}
      - BOOKING_END_HOUR=${BOOKING_END_HOUR:-17}
      - BOOKING_DAYS_AHEAD=${BOOKING_DAYS_AHEAD:-14}
      - BOOKING_MIN_NOTICE_MINUTES=${BOOKING_MIN_NOTICE_MINUTES:-1440}
      - BOOKING_WORK_DAYS_ONLY=${BOOKING_WORK_DAYS_ONLY:-true}
      - BOOKING_DEBUG=${BOOKING_DEBUG:-false}
    restart: unless-stopped
